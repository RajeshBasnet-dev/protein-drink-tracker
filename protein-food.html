<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Protein Food List - Protein Drink Tracker</title>
  <link rel="icon" href="icons/icon2.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="translations.js"></script>
  <script>
    (function () {
      const saved = localStorage.getItem('proteinTheme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    .chart-container {
      position: relative;
      height: 60vh;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: var(--glass-bg);
      padding: 1rem;
      border-radius: 16px;
      box-shadow: 0 4px 15px var(--shadow-color);
    }

    .back-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.8rem 2rem;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    h2 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .filter-container {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.5rem 1.2rem;
      margin: 0.25rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .filter-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: white;
      box-shadow: 0 0 10px rgba(233, 69, 96, 0.4);
    }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="header-left">
      <h1 class="logo-text" id="sources-title">Protein Sources</h1>
    </div>
    <div class="header-right">
      <div class="language-picker" style="margin-right: 1rem;">
        <select id="lang-select" aria-label="Select Language"
          style="background-color: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); padding: 0.5rem; border-radius: 4px; cursor: pointer;">
          <option value="en" style="background-color: #16213e; color: rgb(224, 210, 210);">🇺🇸 EN</option>
          <option value="fr" style="background-color: #16213e; color: rgb(229, 216, 216);">🇫🇷 FR</option>
          <option value="nl" style="background-color: #16213e; color: rgb(212, 190, 190);">🇳🇱 NL</option>
          <option value="tr" style="background-color: #16213e; color: rgb(200, 180, 180);">🇹🇷 TR</option>
          <option value="ar" style="background-color: #16213e; color: rgb(210, 190, 190);">🇸🇦 AR</option>
          <option value="es" style="background-color: #16213e; color: rgb(210, 190, 190);">🇪🇸 ES</option>
        </select>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark/Light Mode" title="Toggle Theme">
        🌙
      </button>
    </div>
  </header>

  <div class="main-content" style="text-align: center;">
    
    <h2 id="page-title">Top Natural Protein Foods (per 100g)</h2>

  <div class="filter-container">
    <button class="filter-btn active" id="btn-filter-all" data-filter="all">All</button>
    <button class="filter-btn" id="btn-filter-vegan" data-filter="vegan">Vegan</button>
    <button class="filter-btn" id="btn-filter-vegetarian" data-filter="vegetarian">Vegetarian</button>
    <button class="filter-btn" id="btn-filter-meat" data-filter="meat">Meat</button>
  </div>

    <div class="chart-container">
      <canvas id="proteinChart"></canvas>
    </div>

    <a href="index.html" class="back-btn" id="back-btn">← Back to Tracker</a>

  </div>

  <script>
    let currentLanguage = localStorage.getItem('proteinTrackerLang') || 'en';
    let myChart = null; // Declare myChart globally so we can destroy/recreate it
 
    const baseProteinData = [
      { id: 'soybeans', amount: 36, category: 'vegan' },
      { id: 'chickenBreast', amount: 31, category: 'meat' },
      { id: 'peanutButter', amount: 25, category: 'vegan' },
      { id: 'almonds', amount: 21, category: 'vegan' },
      { id: 'paneer', amount: 18, category: 'vegetarian' },
      { id: 'eggs', amount: 13, category: 'vegetarian' },
      { id: 'greekYogurt', amount: 10, category: 'vegetarian' },
      { id: 'lentils', amount: 9, category: 'vegan' }
    ];

    let currentFilteredData = [...baseProteinData]; // Keep track of active filters

    // Function to generate alternating colors
    const getColors = (dataArray) => dataArray.map((_, index) => index % 2 === 0 ? '#e94560' : '#0f3460');
 
    function initChart() {
      const t = translations[currentLanguage];
      const ctx = document.getElementById('proteinChart').getContext('2d');
      const isDarkMode = document.documentElement.getAttribute('data-theme') !== 'light';
      const textColor = isDarkMode ? '#eee' : '#333';
      const gridColor = isDarkMode ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';

      // If a chart already exists, destroy it before making a new translated one
      if (myChart) {
        myChart.destroy();
      }

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          // Map the data IDs to the translated names
          labels: currentFilteredData.map(item => t.foods[item.id]),
          datasets: [{
            label: t.proteinLabel, // Translated label
            data: currentFilteredData.map(item => item.amount),
            backgroundColor: getColors(currentFilteredData),
            borderColor: 'rgba(233, 69, 96, 0.8)',
            borderWidth: 1,
            borderRadius: 8,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  // e.g. "36g Protein" translated
                  return context.parsed.y + 'g ' + t.proteinLabel.split(' ')[0]; 
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: gridColor },
              ticks: { color: textColor, font: { family: "'Segoe UI', Roboto, sans-serif" } },
              title: {
                display: true,
                text: t.proteinContent, // Translated Y-axis title
                color: textColor
              }
            },
            x: {
              grid: { display: false },
              ticks: { color: textColor, font: { family: "'Segoe UI', Roboto, sans-serif", weight: 'bold' } }
            }
          }
        }
      });
    }

    function updatePageTranslations() {
      if (!translations || !translations[currentLanguage]) {
        console.error('Translations not loaded yet');
        return;
      }

      const t = translations[currentLanguage];
      
      // Update HTML Text
      document.getElementById('sources-title').textContent = t.proteinSourcesTitle;
      document.getElementById('page-title').textContent = t.proteinFoodPageTitle;
      document.getElementById('back-btn').textContent = t.backToTracker;
      document.title = `${t.proteinSourcesTitle} - Protein Drink Tracker`;
    
      if (t.filters) {
        document.getElementById('btn-filter-all').textContent = t.filters.all;
        document.getElementById('btn-filter-vegan').textContent = t.filters.vegan;
        document.getElementById('btn-filter-vegetarian').textContent = t.filters.vegetarian;
        document.getElementById('btn-filter-meat').textContent = t.filters.meat;
      }

      initChart();
    }

    // Filter Logic
    function filterChart(filterType) {
      if (filterType === 'all') {
        currentFilteredData = baseProteinData;
      } else if (filterType === 'vegetarian') {
        currentFilteredData = baseProteinData.filter(item => item.category === 'vegetarian' || item.category === 'vegan');
      } else {
        currentFilteredData = baseProteinData.filter(item => item.category === filterType);
      }
      initChart(); // Re-initialize with new filtered data to maintain translations
    }

    // Filter Button Listeners
    const filterButtons = document.querySelectorAll('.filter-btn');
    filterButtons.forEach(button => {
      button.addEventListener('click', (e) => {
        filterButtons.forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        const filterType = e.target.getAttribute('data-filter');
        filterChart(filterType);
      });
    });

    // Language Dropdown Listener
    document.getElementById('lang-select').value = currentLanguage;
    document.getElementById('lang-select').addEventListener('change', function (e) {
      currentLanguage = e.target.value;
      localStorage.setItem('proteinTrackerLang', currentLanguage);
      updatePageTranslations();
    });

    // Theme Toggle Listener
    const current = document.documentElement.getAttribute('data-theme');
    document.getElementById('theme-toggle').textContent = current === 'dark' ? '🌙' : '☀️';
    
    document.getElementById('theme-toggle').addEventListener('click', function () {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('proteinTheme', newTheme);
      this.textContent = newTheme === 'dark' ? '🌙' : '☀️';
      
      initChart(); // Redraw chart for new theme colors
    });

    // Initial Load
    updatePageTranslations();
  </script>
</body>
</html>
